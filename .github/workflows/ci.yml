name: CI

on:
  push:
  pull_request:

jobs:
  commit-lint:
    name: Commit message
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit message format
        run: |
          MSG=$(git log -1 --pretty=%s)
          echo "Commit: $MSG"
          if ! echo "$MSG" | grep -qP '^:[a-z_]+: [A-Z]'; then
            echo "Invalid commit message format."
            echo "Expected: :[emoji]: Capitalized message"
            echo "Example:  :sparkles: Add user filtering"
            exit 1
          fi

  lint:
    name: Code quality
    needs: commit-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --with dev

      - name: Check code
        run: make lint

  tests:
    name: Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run tests
        run: make test
